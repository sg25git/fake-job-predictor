<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake Job Predictor</title>

```
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        background: linear-gradient(to right, #667eea, #764ba2);
    }
    .card {
        margin-top: 40px;
        border-radius: 15px;
    }
    label {
        font-weight: 500;
    }
    .result-box {
        padding: 15px;
        border-radius: 10px;
    }
    .real {
        background-color: #d4edda;
        color: #155724;
    }
    .fake {
        background-color: #f8d7da;
        color: #721c24;
    }
</style>
```

</head>

<body>
<div class="container">
    <div class="card shadow p-4 bg-white">
        <h2 class="text-center mb-4">Fake Job Posting Predictor</h2>

```
    <form method="POST" action="/predict">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Job Title:</label>
                <input type="text" name="title" class="form-control" value="{{ title or '' }}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Location:</label>
                <input type="text" name="location" class="form-control" value="{{ location or '' }}" required>
            </div>
        </div>

        <div class="mb-3">
            <label>Company Profile:</label>
            <textarea name="company" class="form-control">{{ company or '' }}</textarea>
        </div>

        <div class="mb-3">
            <label>Job Description:</label>
            <textarea name="description" class="form-control" rows="4" required>{{ description or '' }}</textarea>
        </div>

        <div class="mb-3">
            <label>Requirements:</label>
            <textarea name="requirements" class="form-control">{{ requirements or '' }}</textarea>
        </div>

        <div class="mb-3">
            <label>Benefits:</label>
            <textarea name="benefits" class="form-control">{{ benefits or '' }}</textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Employment Type:</label>
                <input type="text" name="employment_type" class="form-control" value="{{ employment_type or '' }}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Experience Level:</label>
                <input type="text" name="experience" class="form-control" value="{{ experience or '' }}">
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Predict</button>
    </form>

    {% if prediction %}
    <div class="mt-4 text-center">

        <div class="result-box {% if 'Fake' in prediction %}fake{% else %}real{% endif %}">
            <h3>{{ prediction }}</h3>

            {% if confidence %}
            <p>Confidence: {{ confidence }}%</p>
            {% endif %}
        </div>

        <canvas id="resultChart" class="mt-4"></canvas>
    </div>
    {% endif %}

</div>
```

</div>

{% if prediction %}

<script>
    const result = "{{ prediction }}";
    const isFake = result.includes("Fake");

    new Chart(document.getElementById('resultChart'), {
        type: 'doughnut',
        data: {
            labels: ['Real', 'Fake'],
            datasets: [{
                data: isFake ? [20, 80] : [80, 20],
                backgroundColor: ['#28a745', '#dc3545']
            }]
        }
    });
</script>

{% endif %}

</body>
</html>
